[build]
  command = "npm run build"
  publish = "_site"
  functions = "src/netlify/functions"

# Form notifications — sends to hello@midhertsdivers.com
# Configure in Netlify UI: Forms > Notifications > Email

# Scheduled function for Instagram token refresh
[functions."refresh-token"]
  schedule = "0 9 * * 1"

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
